<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LARMOR</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
  :root {
    --bg: #f4f5f3; --panel: #ffffff; --ink: #16202a; --muted: #5a6871;
    --accent: #0e7c86; --accent-soft: #e2f0f0; --line: #d7dcd9; --bad: #b0442e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 system-ui, sans-serif; background: var(--bg); color: var(--ink); }
  header { display: flex; align-items: baseline; gap: 1rem; padding: 0.7rem 1.2rem; background: var(--panel); border-bottom: 1px solid var(--line); }
  header h1 { font-size: 1.1rem; margin: 0; letter-spacing: 0.06em; }
  header h1 span { color: var(--accent); }
  #meta { color: var(--muted); font-size: 0.85rem; }
  main { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 12px; padding: 12px; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
  #plot { width: 100%; height: 520px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
  input[type=text], input[type=number] { border: 1px solid var(--line); border-radius: 5px; padding: 5px 8px; font: inherit; }
  input[type=text] { flex: 1; min-width: 200px; }
  input[type=number] { width: 90px; }
  button { border: 1px solid var(--accent); background: var(--accent); color: #fff; border-radius: 5px; padding: 6px 14px; font: inherit; cursor: pointer; }
  button.secondary { background: var(--panel); color: var(--accent); }
  button:disabled { opacity: 0.5; cursor: default; }
  .site { border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; }
  .site h3 { margin: 0 0 6px; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
  .site h3 .del { color: var(--bad); background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 0; }
  .param { display: grid; grid-template-columns: 1fr 88px 20px; gap: 6px; align-items: center; margin-bottom: 4px; font-size: 0.82rem; }
  .param label { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .param label .linked { color: var(--accent); font-weight: 600; }
  .param .err { grid-column: 1 / -1; color: var(--accent); font-size: 0.75rem; text-align: right; }
  .constraints { display: grid; grid-template-columns: 1fr 62px 62px; gap: 4px; margin: -2px 0 6px; }
  .constraints input { font-size: 0.75rem; padding: 3px 6px; width: 100%; }
  .constraints input.expr::placeholder { color: #9fb0b6; }
  .advBtn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.75rem; padding: 0 4px; }
  #status { font-size: 0.85rem; color: var(--muted); min-height: 1.4em; }
  #status.error { color: var(--bad); }
  #warnings { font-size: 0.8rem; color: var(--bad); }
  #report { white-space: pre-wrap; font: 11px/1.4 ui-monospace, monospace; max-height: 260px; overflow: auto; background: var(--accent-soft); border-radius: 6px; padding: 8px; display: none; }
  .rmsd { font-weight: 600; color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>LARM<span>O</span>R</h1>
  <div id="meta">load a dmfit .fxmla file or a Bruker EXPNO folder to begin</div>
</header>
<main>
  <div class="panel">
    <div class="row">
      <input type="text" id="path" placeholder="C:\path\to\CaAlGlass.fxmla  or  C:\...\EXPNO folder">
      <button id="loadBtn">Load</button>
    </div>
    <div id="plot"></div>
    <div id="status"></div>
    <div id="warnings"></div>
  </div>
  <div class="panel">
    <div class="row">
      <label>window / ppm</label>
      <input type="number" id="winHi" step="any" placeholder="high">
      <input type="number" id="winLo" step="any" placeholder="low">
    </div>
    <div class="row">
      <button id="fitBtn" disabled>Fit</button>
      <button id="addCz" class="secondary" disabled>+ Czjzek site</button>
      <button id="addGl" class="secondary" disabled>+ Gauss/Lor site</button>
    </div>
    <div id="sites"></div>
    <div class="row">
      <input type="text" id="savePath" placeholder="save as ...recipe.json">
      <button id="saveBtn" class="secondary" disabled>Save</button>
    </div>
    <div id="report"></div>
  </div>
</main>
<script>
"use strict";
let state = { recipe: null, sourcePath: null, exp: null };
const $ = id => document.getElementById(id);
const status = (msg, isErr) => { const el = $("status"); el.textContent = msg; el.className = isErr ? "error" : ""; };

async function api(endpoint, body) {
  const r = await fetch("/api/" + endpoint, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!r.ok) {
    let detail = r.statusText;
    try { detail = (await r.json()).detail; } catch (e) {}
    throw new Error(detail);
  }
  return r.json();
}

function defaultParams(model, pos) {
  if (model === "czjzek") return {
    isotropic_chemical_shift_ppm: { value: pos, stderr: null, vary: true, min: null, max: null },
    sigma_Cq_MHz: { value: 2.0, stderr: null, vary: true, min: 0.05, max: null },
    shift_fwhm_ppm: { value: 10.0, stderr: null, vary: true, min: 0.1, max: null },
    amplitude: { value: 1.0, stderr: null, vary: true, min: 0.0, max: null },
  };
  return {
    isotropic_chemical_shift_ppm: { value: pos, stderr: null, vary: true, min: null, max: null },
    shift_fwhm_ppm: { value: 5.0, stderr: null, vary: true, min: 0.1, max: null },
    amplitude: { value: 1.0, stderr: null, vary: true, min: 0.0, max: null },
    gl: { value: 1.0, stderr: null, vary: false, min: 0.0, max: 1.0 },
  };
}

const PARAM_LABELS = {
  isotropic_chemical_shift_ppm: "δiso / ppm",
  sigma_Cq_MHz: "σ(Cq) / MHz",
  shift_fwhm_ppm: "FWHM / ppm",
  amplitude: "amplitude",
  gl: "g/l fraction",
};

const advOpen = new Set();  // site indices with the constraints panel open

function renderSites() {
  const box = $("sites");
  box.innerHTML = "";
  if (!state.recipe) return;
  state.recipe.sites.forEach((site, i) => {
    const div = document.createElement("div");
    div.className = "site";
    const h = document.createElement("h3");
    h.innerHTML = `<span>s${i}: ${site.label || site.model} <small style="color:var(--muted)">(${site.model})</small></span>`;
    const btns = document.createElement("span");
    const adv = document.createElement("button");
    adv.className = "advBtn";
    adv.textContent = advOpen.has(i) ? "constraints ▾" : "constraints ▸";
    adv.title = "fix, bound, or link parameters (e.g. 0.5 * s0.amplitude)";
    adv.onclick = () => { advOpen.has(i) ? advOpen.delete(i) : advOpen.add(i); renderSites(); };
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "remove";
    del.onclick = () => { state.recipe.sites.splice(i, 1); advOpen.delete(i); renderSites(); simulate(); };
    btns.appendChild(adv); btns.appendChild(del);
    h.appendChild(btns);
    div.appendChild(h);
    for (const [pname, p] of Object.entries(site.params)) {
      const row = document.createElement("div");
      row.className = "param";
      const lab = document.createElement("label");
      lab.innerHTML = (PARAM_LABELS[pname] || pname) +
        (p.expr ? ' <span class="linked" title="' + p.expr + '">⚭</span>' : "");
      const inp = document.createElement("input");
      inp.type = "number"; inp.step = "any"; inp.value = Number(p.value.toPrecision(6));
      inp.disabled = !!p.expr;
      inp.title = p.expr ? "derived from: " + p.expr : "";
      inp.onchange = () => { p.value = parseFloat(inp.value); simulate(); };
      const vary = document.createElement("input");
      vary.type = "checkbox"; vary.checked = p.vary && !p.expr; vary.disabled = !!p.expr;
      vary.title = p.expr ? "linked — follows its expression" : "vary in fit";
      vary.onchange = () => { p.vary = vary.checked; };
      row.appendChild(lab); row.appendChild(inp); row.appendChild(vary);
      if (p.stderr != null) {
        const err = document.createElement("div");
        err.className = "err"; err.textContent = "± " + Number(p.stderr.toPrecision(3));
        row.appendChild(err);
      }
      div.appendChild(row);
      if (advOpen.has(i)) {
        const c = document.createElement("div");
        c.className = "constraints";
        const expr = document.createElement("input");
        expr.type = "text"; expr.className = "expr";
        expr.placeholder = "link: e.g. 0.5 * s0." + pname;
        expr.value = p.expr || "";
        expr.onchange = () => { p.expr = expr.value.trim() || null; renderSites(); simulate(); };
        const lo = document.createElement("input");
        lo.type = "number"; lo.step = "any"; lo.placeholder = "min";
        if (p.min != null) lo.value = p.min;
        lo.onchange = () => { p.min = lo.value === "" ? null : parseFloat(lo.value); };
        const hi = document.createElement("input");
        hi.type = "number"; hi.step = "any"; hi.placeholder = "max";
        if (p.max != null) hi.value = p.max;
        hi.onchange = () => { p.max = hi.value === "" ? null : parseFloat(hi.value); };
        c.appendChild(expr); c.appendChild(lo); c.appendChild(hi);
        div.appendChild(c);
      }
    }
    box.appendChild(div);
  });
}

function plot(model) {
  const traces = [{
    x: state.exp.ppm, y: state.exp.amp, name: "experiment",
    line: { color: "#16202a", width: 1 },
  }];
  if (model) {
    traces.push({ x: model.x, y: model.total, name: "model", line: { color: "#b0442e", width: 1.6 } });
    model.sites.forEach((ys, i) => traces.push({
      x: model.x, y: ys, name: model.labels[i],
      line: { width: 1, dash: "dash" }, opacity: 0.65,
    }));
  }
  Plotly.react("plot", traces, {
    margin: { t: 24, r: 12, l: 48, b: 42 },
    xaxis: { title: "shift / ppm", autorange: "reversed" },
    yaxis: { title: "intensity" },
    legend: { orientation: "h", y: 1.12 },
  }, { responsive: true, displaylogo: false });
}

let simTimer = null;
function simulate() {
  if (!state.recipe) return;
  clearTimeout(simTimer);
  simTimer = setTimeout(async () => {
    try {
      const hasCz = state.recipe.sites.some(s => s.model === "czjzek");
      if (hasCz) status("simulating… (first Czjzek call builds the kernel, ~15 s once)");
      const model = await api("simulate", { recipe: state.recipe, source_path: state.sourcePath });
      plot(model);
      status("");
    } catch (e) { status("simulate failed: " + e.message, true); }
  }, 250);
}

$("loadBtn").onclick = async () => {
  try {
    status("loading…");
    const data = await api("load", { path: $("path").value.trim() });
    state.recipe = data.recipe;
    state.sourcePath = $("path").value.trim();
    state.exp = { ppm: data.ppm, amp: data.amp };
    $("meta").textContent = data.meta;
    $("warnings").textContent = data.warnings.join(" • ");
    $("winHi").value = Math.max(...data.ppm).toFixed(0);
    $("winLo").value = Math.min(...data.ppm).toFixed(0);
    ["fitBtn", "addCz", "addGl", "saveBtn"].forEach(id => $(id).disabled = false);
    renderSites();
    plot(null);
    if (state.recipe.sites.length) simulate(); else status("no sites yet — add one, or click Fit after adding");
  } catch (e) { status("load failed: " + e.message, true); }
};

$("fitBtn").onclick = async () => {
  try {
    status("fitting…");
    $("fitBtn").disabled = true;
    const win = [parseFloat($("winHi").value), parseFloat($("winLo").value)];
    const res = await api("fit", {
      recipe: state.recipe, source_path: state.sourcePath,
      window: isFinite(win[0]) && isFinite(win[1]) ? win : null,
    });
    state.recipe = res.recipe;
    renderSites();
    plot(res);
    const frozen = res.frozen.length ? `\nfrozen (outside window): ${res.frozen.join(", ")}` : "";
    const bounds = res.at_bounds && res.at_bounds.length
      ? `\n⚠ at bounds (constraint or start value fighting the data?): ${res.at_bounds.join(", ")}` : "";
    status("");
    $("report").style.display = "block";
    $("report").textContent = `RMSD ${res.rmsd.toFixed(4)}${frozen}${bounds}\n\n${res.report}`;
  } catch (e) { status("fit failed: " + e.message, true); }
  finally { $("fitBtn").disabled = false; }
};

function addSite(model) {
  if (!state.recipe) return;
  const mid = state.exp ? state.exp.ppm[state.exp.amp.indexOf(Math.max(...state.exp.amp))] : 0;
  const n = state.recipe.sites.length;
  state.recipe.sites.push({ model, label: `${model}-${n}`, params: defaultParams(model, mid) });
  renderSites();
  simulate();
}
$("addCz").onclick = () => addSite("czjzek");
$("addGl").onclick = () => addSite("gauss_lor");

$("saveBtn").onclick = async () => {
  try {
    const res = await api("save", { recipe: state.recipe, path: $("savePath").value.trim() });
    status("saved: " + res.saved);
  } catch (e) { status("save failed: " + e.message, true); }
};

$("path").addEventListener("keydown", e => { if (e.key === "Enter") $("loadBtn").click(); });
</script>
</body>
</html>
